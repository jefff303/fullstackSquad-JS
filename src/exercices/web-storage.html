<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css">
    <title>Exercice Web Storage</title>
</head>

<body class="min-h-screen">
    <div class="drawer min-h-screen">
        <input id="drawer-toggle" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content flex flex-col min-h-screen">
            <div id="navbar-container"></div>

            <main class="flex-1 container mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
                <a class="link " href="../../index.html">Home</a>

                <section class="mt-6 sm:mt-8 w-full max-w-3xl mx-auto">

                    <fieldset class="fieldset bg-base-100 border-base-300 rounded-box w-64 border p-4 mb-3">
                        <legend class="fieldset-legend">Affichage</legend>
                        <label class="label cursor-pointer justify-between">
                            <span class="label-text">Mode sombre</span>
                            <input id="darkmode-toggle" type="checkbox" class="toggle toggle-primary" />
                        </label>
                    </fieldset>


                    <div class="card bg-base-100 shadow-xl border border-base-300/50">
                        <div class="card-body gap-5 sm:gap-6 p-5 sm:p-8">
                            <div class="space-y-2">
                                <h1 class="text-2xl sm:text-3xl font-bold">Bloc-notes local</h1>
                                <p class="text-base-content/70 text-sm sm:text-base">
                                    Saisissez une note ci-dessous, puis enregistrez-la pour la persister avec
                                    <code
                                        class="text-xs sm:text-sm bg-base-200 px-1.5 py-0.5 rounded">localStorage</code>.
                                </p>
                            </div>

                            <form id="note-form" class="flex flex-col gap-4 sm:gap-5" novalidate>
                                <fieldset class="fieldset w-full">
                                    <legend class="fieldset-legend text-base sm:text-lg">Votre note</legend>
                                    <label class="label w-full" for="note-textarea">
                                        <span class="label-text font-medium">Contenu</span>
                                    </label>
                                    <textarea id="note-textarea" name="note"
                                        class="textarea textarea-bordered w-full min-h-36 sm:min-h-44 resize-y text-base leading-relaxed"
                                        placeholder="Écrivez votre note ici…" rows="6" spellcheck="true"></textarea>
                                </fieldset>

                                <div
                                    class="flex flex-col-reverse sm:flex-row sm:items-center sm:justify-between gap-3 pt-1">
                                    <p class="text-xs sm:text-sm text-base-content/60 text-center sm:text-left">
                                        La note reste disponible après rechargement de la page.
                                    </p>
                                    <p class="textRender bg-indigo-200 text-base-content/70 text-sm sm:text-base"></p>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>

            </main>

            <div id="footer-container"></div>
        </div>
    </div>
    <script type="module" src="web-storage.js"></script>
</body>

</html>
