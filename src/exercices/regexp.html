<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice DOM Regexp</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body class="bg-base-200 min-h-screen">
    <div class="container mx-auto w-full max-w-none px-4 sm:px-6 lg:px-8 py-6 flex flex-col gap-6">
        <a class="link " href="../../index.html">Home</a>

        <section class="w-full max-w-xl mx-auto">
            <div class="card bg-base-100 shadow-xl border border-base-300/50">
                <div class="card-body p-5 sm:p-8 gap-5">
                    <div class="space-y-2 text-center sm:text-left">
                        <h1 class="text-2xl sm:text-3xl font-bold">Connexion</h1>
                        <p class="text-sm sm:text-base text-base-content/70">
                            Connectez-vous avec votre email et votre mot de passe.
                        </p>
                    </div>

                    <form id="login-form" class="flex flex-col gap-4 sm:gap-5" novalidate>
                        <fieldset class="fieldset w-full">
                            <legend class="fieldset-legend text-base">Adresse email</legend>
                            <input
                                id="login-email"
                                name="email"
                                type="email"
                                autocomplete="email"
                                required
                                placeholder="jean.dupont@email.com"
                                class="input input-bordered w-full"
                            />
                        </fieldset>

                        <fieldset class="fieldset w-full">
                            <legend class="fieldset-legend text-base">Mot de passe</legend>
                            <input
                                id="login-password"
                                name="password"
                                type="password"
                                autocomplete="current-password"
                                minlength="8"
                                required
                                placeholder="Minimum 8 caractères"
                                class="input input-bordered w-full"
                            />
                        </fieldset>
                        <fieldset class="fieldset w-full">
                            <legend class="fieldset-legend text-base">Mot de passe</legend>
                            <div class="error-list">
                                
                            </div>
                        </fieldset>

                        <button type="submit" class="btn btn-primary btn-block sm:btn-wide sm:self-end">
                            Se connecter
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <script src="regexp.js"></script>
</body>

</html>
